<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Track Your Order | NAR Jewellers</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #fefcf7, #f8f1e4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .tracking-container {
      background-color: #fff;
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 850px;
      width: 100%;
      border: 1px solid #f0e6d2;
    }

    .tracking-container h2 {
      font-family: 'Playfair Display', serif;
      color: #2c2c2c;
      font-size: 30px;
      margin-bottom: 10px;
    }

    .tracking-container p {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
    }

    .steps {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      margin: 50px 0;
    }

    .step {
      position: relative;
      z-index: 1;
      background-color: #e6dac4;
      color: white;
      width: 48px;
      height: 48px;
      line-height: 48px;
      border-radius: 50%;
      font-weight: bold;
      transition: background-color 0.4s ease;
      font-size: 16px;
    }

    .step.active {
      background-color: #d4af37;
      box-shadow: 0 0 8px rgba(212, 175, 55, 0.6);
    }

    .step-label {
      position: absolute;
      top: 60px;
      width: 130px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #3e3e3e;
    }

    .line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background-color: #e6dac4;
      z-index: 0;
    }

    .line-progress {
      position: absolute;
      top: 50%;
      left: 0;
      height: 4px;
      background-color: #d4af37;
      z-index: 0;
      width: 0;
      transition: width 0.6s ease;
    }

    button {
      margin-top: 30px;
      padding: 14px 30px;
      font-size: 16px;
      background-color: #d4af37;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #b7932e;
    }

    @media (max-width: 600px) {
      .steps {
        flex-direction: column;
        height: auto;
      }

      .line,
      .line-progress {
        display: none;
      }

      .step {
        margin-bottom: 50px;
      }

      .step-label {
        position: relative;
        top: 10px;
        left: auto;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="tracking-container">
    <h2>Order Tracking</h2>
    <p>Order ID: <strong>#NARJEWELS3025</strong></p>

    <div class="steps">
      <div class="line"></div>
      <div class="line-progress" id="progress-line"></div>

      <div class="step" id="step-0">1
        <div class="step-label">Order Confirmed</div>
      </div>
      <div class="step" id="step-1">2
        <div class="step-label">Processing</div>
      </div>
      <div class="step" id="step-2">3
        <div class="step-label">Dispatched</div>
      </div>
      <div class="step" id="step-3">4
        <div class="step-label">Out for Delivery</div>
      </div>
    </div>

    <button onclick="goHome()">Back to Home</button>
  </div>

  <script>
    function goHome() {
      window.location.href = "index.html";
    }

    const steps = document.querySelectorAll('.step');
    const progressLine = document.getElementById('progress-line');
    let currentStep = 0;

    function updateProgress() {
      if (currentStep < steps.length) {
        steps[currentStep].classList.add('active');
        const progressPercent = (currentStep) / (steps.length - 1) * 100;
        progressLine.style.width = progressPercent + '%';
        currentStep++;
        setTimeout(updateProgress, 1600); // Delay before next step
      }
    }

    window.onload = function () {
      updateProgress();
    };
  </script>
</body>
</html>
