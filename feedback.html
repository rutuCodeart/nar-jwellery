<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NAR Jewellers - Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(to bottom, #fdf6e3, #f5e6c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
    }

    .container h2 {
      color: #b08d57;
      text-align: center;
      margin-bottom: 5px;
    }

    .container p {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      height: 90px;
    }

    button {
      width: 100%;
      background-color: #b08d57;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #967746;
    }

    .success-message {
      display: none;
      margin-top: 15px;
      padding: 12px;
      background-color: #e6f4ea;
      color: #2e6633;
      border: 1px solid #c3e6cb;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>💎 NAR Jewellers Feedback</h2>
    <p>Your opinion matters. Help us sparkle even brighter!</p>

    <form id="feedbackForm">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>

      <label for="product">Jewellery Item</label>
      <input type="text" id="product" name="product" required>

      <label for="rating">Rate Your Experience</label>
      <select id="rating" name="rating" required>
        <option value="">Select Rating</option>
        <option value="5">💎💎💎💎💎 Excellent</option>
        <option value="4">💎💎💎💎 Good</option>
        <option value="3">💎💎💎 Average</option>
        <option value="2">💎💎 Fair</option>
        <option value="1">💎 Poor</option>
      </select>

      <label for="feedback">Your Feedback</label>
      <textarea id="feedback" name="feedback" placeholder="Share your experience with us..." required></textarea>

      <button type="submit">Submit Feedback</button>
    </form>

    <div class="success-message" id="successMessage">✅ Thank you for your feedback!</div>
  </div>

  <script>
    const form = document.getElementById("feedbackForm");
    const successMsg = document.getElementById("successMessage");

    form.addEventListener("submit", function (e) {
      e.preventDefault(); // prevent page reload

      const name = document.getElementById("name").value.trim();
      const product = document.getElementById("product").value.trim();
      const rating = document.getElementById("rating").value;
      const feedback = document.getElementById("feedback").value.trim();

      if (!name || !product || !rating || !feedback) {
        alert("Please fill in all fields.");
        return;
      }

      // Log feedback to console (for testing)
      console.log("Submitted Feedback:");
      console.log("Name:", name);
      console.log("Product:", product);
      console.log("Rating:", rating);
      console.log("Feedback:", feedback);

      // Show success message
      successMsg.style.display = "block";

      // Clear the form
      form.reset();

      // Hide success message after 3 seconds
      setTimeout(() => {
        successMsg.style.display = "none";
      }, 3000);
    });
  </script>

</body>
</html>
