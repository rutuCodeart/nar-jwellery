<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jewelry Shop Contact Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: yellow no-repeat center center/cover;
      height: 150vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      background: rgba(50, 50, 50, 0.7);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 600px;
      color: #fff;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    p.subtitle {
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
      color: #ddd;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      margin-bottom: 15px;
      font-size: 14px;
      outline: none;
    }

    .name-fields {
      display: flex;
      gap: 10px;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
    }

    textarea {
      height: 100px;
      border-radius: 15px;
      resize: none;
    }

    .captcha {
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      color: #000;
      margin: 15px 0;
    }

    button {
      width: 100%;
      background: #fff;
      color: #333;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Jewelry Shop Contact Form</h2>
    <p class="subtitle">How can we help you, dear jewelry lover?</p>
    <form>
      <!-- Name -->
      <label>Name:<span style="color:red">*</span></label>
      <div class="name-fields">
        <input type="text" placeholder="First*" required>
        <input type="text" placeholder="Last*" required>
      </div>

      <!-- Email -->
      <label>Email address:<span style="color:red">*</span></label>
      <input type="email" required>

      <!-- Purchase Question -->
      <label>Did you purchase from us?<span style="color:red">*</span></label>
      <div class="radio-group">
        <label><input type="radio" name="purchase" required> Yes</label>
        <label><input type="radio" name="purchase" required> No</label>
      </div>

      <!-- Message -->
      <label>Your message:</label>
      <textarea placeholder="Type your message here..."></textarea>

      <!-- Captcha -->
      <label>Verification<span style="color:red">*</span></label>
      <div class="captcha">
        <input type="checkbox"> I'm not a robot
      </div>

      <!-- Submit -->
      <button type="submit">SUBMIT FORM</button>
    </form>
  </div>

</body>
</html>
